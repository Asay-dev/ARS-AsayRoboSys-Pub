name: 生成完整文档 PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:          # ← 关键：授予写权限
      contents: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Pandoc + XeLaTeX + 中文字体
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-lang-chinese texlive-latex-extra fonts-noto-cjk imagemagick

      - name: 生成水印图片（白底转透明 + 30% 透明度）
        run: |
          convert img/DWI-white-logo.png \
            -fuzz 10% -transparent white \
            -alpha set \
            -channel alpha -evaluate multiply 0.3 \
            watermark.png

      - name: 创建页眉页脚水印配置
        run: |
          LOGO_PATH="$(pwd)/watermark.png"
          {
            printf '%s\n' '\usepackage{graphicx}'
            printf '%s\n' '\usepackage{fancyhdr}'
            printf '%s\n' '\usepackage{eso-pic}'
            printf '%s\n' '\pagestyle{fancy}'
            printf '%s\n' '\fancyhf{}'
            printf '%s\n' '\fancyhead[C]{\textbf{\textit{DiskWorldIntelligent}}}'
            printf '%s\n' '\fancyfoot[C]{\thepage}'
            printf '%s\n' '\renewcommand{\headrulewidth}{0.4pt}'
            printf '%s\n' '\renewcommand{\footrulewidth}{0pt}'
            printf '%s\n' '\fancypagestyle{plain}{\fancyhf{}\fancyhead[C]{\textbf{\textit{DiskWorldIntelligent}}}\fancyfoot[C]{\thepage}\renewcommand{\headrulewidth}{0.4pt}\renewcommand{\footrulewidth}{0pt}}'
            printf '%s\n' '\AtBeginDocument{\pagestyle{fancy}}'
            printf '%s\n' "\AddToShipoutPictureBG{\put(\LenToUnit{.5\paperwidth},\LenToUnit{.5\paperheight}){\makebox(0,0){\includegraphics[width=0.8\paperwidth,keepaspectratio]{${LOGO_PATH}}}}}"
          } > header.tex

      - name: 生成完整单体 PDF（自动目录 + 中文完美支持）
        run: |
          pandoc \
            README.md \
            ARS-API.md \
            "ROV框架式参数.md" \
            "检修手册.md" \
            "比赛说明书参考.md" \
            "API&定制版说明.md" \
            "DWIHub版开机配置.md" \
            "开机配置.md" \
            -o "ARS-AsayRoboSys-Documentation.pdf" \
            --toc \
            --toc-depth=3 \
            --number-sections \
            --pdf-engine=xelatex \
            --include-in-header=header.tex \
            --variable mainfont="Noto Sans CJK SC" \
            --variable sansfont="Noto Sans CJK SC" \
            --variable monofont="Noto Sans Mono CJK SC" \
            --variable geometry="margin=2cm" \
            --variable colorlinks=true \
            --highlight-style=tango

      - name: 自动提交最新 PDF 到仓库
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: 自动更新完整文档 PDF"
          file_pattern: ARS-AsayRoboSys-Documentation.pdf